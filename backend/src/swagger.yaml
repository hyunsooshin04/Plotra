      - $ref: "#/components/parameters/Id"
    get:
      tags: [Plots]
      summary: Get plot item
      operationId: getPlotItem
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlotItem" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Plots]
      summary: Update plot item
      operationId: updatePlotItem
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                type:
                  type: string
                  enum: [synopsis, act, event, foreshadowing, conflict, ending_candidate, scene, other]
                content: { type: string }
                sortOrder: { type: integer }
                metadata: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlotItem" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Plots]
      summary: Delete plot item (soft)
      operationId: deletePlotItem
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Plot ↔ Chapters ───
  /api/projects/{projectId}/plots/{id}/chapters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Plot Chapters]
      summary: List linked chapters
      operationId: listPlotItemChapters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlotItemChapter" }
    post:
      tags: [Plot Chapters]
      summary: Link chapter to plot item
      operationId: createPlotItemChapter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapterId]
              properties:
                chapterId: { type: string, format: uuid }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlotItemChapter" }

  /api/projects/{projectId}/plots/{id}/chapters/{linkId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
      - $ref: "#/components/parameters/LinkId"
    delete:
      tags: [Plot Chapters]
      summary: Unlink chapter from plot item
      operationId: deletePlotItemChapter
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Plot ↔ Characters ───
  /api/projects/{projectId}/plots/{id}/characters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Plot Characters]
      summary: List linked characters
      operationId: listPlotItemCharacters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlotItemCharacter" }
    post:
      tags: [Plot Characters]
      summary: Link character to plot item
      operationId: createPlotItemCharacter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [characterId]
              properties:
                characterId: { type: string, format: uuid }
                role: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlotItemCharacter" }

  /api/projects/{projectId}/plots/{id}/characters/{linkId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
      - $ref: "#/components/parameters/LinkId"
    delete:
      tags: [Plot Characters]
      summary: Unlink character from plot item
      operationId: deletePlotItemCharacter
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Notes ───
  /api/projects/{projectId}/notes:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Notes]
      summary: List notes
      operationId: listNotes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Note" }
    post:
      tags: [Notes]
      summary: Create note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                content: { type: string }
                metadata: { type: object }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }

  /api/projects/{projectId}/notes/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Notes]
      summary: Get note
      operationId: getNote
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Notes]
      summary: Update note
      operationId: updateNote
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
                metadata: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Notes]
      summary: Delete note (soft)
      operationId: deleteNote
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Glossary ───
  /api/projects/{projectId}/glossary:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Glossary]
      summary: List glossary entries
      operationId: listGlossary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GlossaryEntry" }
    post:
      tags: [Glossary]
      summary: Create glossary entry
      operationId: createGlossaryEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [term, definition]
              properties:
                term: { type: string }
                definition: { type: string }
                tags:
                  type: array
                  items: { type: string }
                metadata: { type: object }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlossaryEntry" }

  /api/projects/{projectId}/glossary/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Glossary]
      summary: Get glossary entry
      operationId: getGlossaryEntry
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlossaryEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Glossary]
      summary: Update glossary entry
      operationId: updateGlossaryEntry
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                term: { type: string }
                definition: { type: string }
                tags:
                  type: array
                  items: { type: string }
                metadata: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlossaryEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Glossary]
      summary: Delete glossary entry (soft)
      operationId: deleteGlossaryEntry
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

# ──────────────────────────────────────
# Components
# ──────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Encrypted JWT token"

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string, format: uuid }
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    LinkId:
      name: linkId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RelId:
      name: relId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
    Deleted:
      description: Deleted
      content:
        application/json:
          schema:
            type: object
            properties:
              deleted: { type: boolean }

  schemas:
    UserPublic:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        nickname: { type: string }
        createdAt: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        genre: { type: string, nullable: true }
        settings: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    Chapter:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        title: { type: string }
        content: { type: string }
        summary: { type: string, nullable: true }
        sortOrder: { type: integer }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    Character:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        name: { type: string }
        profile: { type: string, nullable: true }
        personality: { type: string, nullable: true }
        goals: { type: string, nullable: true }
        weaknesses: { type: string, nullable: true }
        conflicts: { type: string, nullable: true }
        backstory: { type: string, nullable: true }
        appearance: { type: string, nullable: true }
        speechStyle: { type: string, nullable: true }
        growthArc: { type: string, nullable: true }
        traits: { type: object }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    CharacterRelationship:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        characterId: { type: string, format: uuid }
        relatedCharacterId: { type: string, format: uuid }
        relationshipType:
          type: string
          enum: [ally, rival, mentor, student, family, romantic, enemy, colleague, other]
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    WorldItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        name: { type: string }
        category:
          type: string
          enum: [region, nation, city, race, organization, magic_system, technology, rule, religion, language, other]
        content: { type: string }
        summary: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    WorldItemLink:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        targetId: { type: string, format: uuid }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CharacterWorldItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        characterId: { type: string, format: uuid }
        worldItemId: { type: string, format: uuid }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    PlotItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        title: { type: string }
        type:
          type: string
          enum: [synopsis, act, event, foreshadowing, conflict, ending_candidate, scene, other]
        content: { type: string }
        sortOrder: { type: integer }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    PlotItemChapter:
      type: object
      properties:
        id: { type: string, format: uuid }
        plotItemId: { type: string, format: uuid }
        chapterId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    PlotItemCharacter:
      type: object
      properties:
        id: { type: string, format: uuid }
        plotItemId: { type: string, format: uuid }
        characterId: { type: string, format: uuid }
        role: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Note:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        title: { type: string }
        content: { type: string }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    GlossaryEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        term: { type: string }
        definition: { type: string }
        tags:
          type: array
          items: { type: string }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
