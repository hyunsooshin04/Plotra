openapi: "3.0.3"
info:
  title: Plotra API
  description: 소설 창작 AI 보조 플랫폼 - REST API
  version: "1.0.0"
servers:
  - url: http://localhost:4000
    description: Local development

tags:
  - name: Auth
  - name: Health
  - name: Projects
  - name: Chapters
  - name: Characters
  - name: Character Relationships
  - name: World Items
  - name: World Item Links
  - name: World Item Characters
  - name: Plots
  - name: Plot Chapters
  - name: Plot Characters
  - name: Notes
  - name: Glossary

# ──────────────────────────────────────
# Paths
# ──────────────────────────────────────
security:
  - BearerAuth: []

paths:
  # ─── Auth ───
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, nickname]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 1 }
                nickname: { type: string }
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/UserPublic" }
                  token: { type: string, description: "Encrypted JWT token" }
        "400":
          description: Missing fields
          content:
            application/json:
              schema: { type: object, properties: { error: { type: string } } }
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { type: object, properties: { error: { type: string } } }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/UserPublic" }
                  token: { type: string, description: "Encrypted JWT token" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { type: object, properties: { error: { type: string } } }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPublic" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { type: object, properties: { error: { type: string } } }

  # ─── Health ───
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  status: { type: string }
                  timestamp: { type: string, format: date-time }
                  database: { type: string }

  # ─── Projects ───
  /api/projects:
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Project" }
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                genre: { type: string }
                settings: { type: object }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }

  /api/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Projects]
      summary: Get project
      operationId: getProject
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Projects]
      summary: Update project
      operationId: updateProject
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                genre: { type: string }
                settings: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Projects]
      summary: Delete project (soft)
      operationId: deleteProject
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Chapters ───
  /api/projects/{projectId}/chapters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Chapters]
      summary: List chapters
      operationId: listChapters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Chapter" }
    post:
      tags: [Chapters]
      summary: Create chapter
      operationId: createChapter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                content: { type: string }
                summary: { type: string }
                sortOrder: { type: integer }
                metadata: { type: object }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chapter" }

  /api/projects/{projectId}/chapters/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Chapters]
      summary: Get chapter
      operationId: getChapter
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chapter" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Chapters]
      summary: Update chapter
      operationId: updateChapter
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
                summary: { type: string }
                sortOrder: { type: integer }
                metadata: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chapter" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Chapters]
      summary: Delete chapter (soft)
      operationId: deleteChapter
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Characters ───
  /api/projects/{projectId}/characters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Characters]
      summary: List characters
      operationId: listCharacters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Character" }
    post:
      tags: [Characters]
      summary: Create character
      operationId: createCharacter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                profile: { type: string }
                personality: { type: string }
                goals: { type: string }
                weaknesses: { type: string }
                conflicts: { type: string }
                backstory: { type: string }
                appearance: { type: string }
                speechStyle: { type: string }
                growthArc: { type: string }
                traits: { type: object }
                metadata: { type: object }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }

  /api/projects/{projectId}/characters/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Characters]
      summary: Get character
      operationId: getCharacter
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Characters]
      summary: Update character
      operationId: updateCharacter
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                profile: { type: string }
                personality: { type: string }
                goals: { type: string }
                weaknesses: { type: string }
                conflicts: { type: string }
                backstory: { type: string }
                appearance: { type: string }
                speechStyle: { type: string }
                growthArc: { type: string }
                traits: { type: object }
                metadata: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Characters]
      summary: Delete character (soft)
      operationId: deleteCharacter
      responses:
        "200": { $ref: "#/components/responses/Deleted" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Character Relationships ───
  /api/projects/{projectId}/characters/{id}/relationships:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Character Relationships]
      summary: List relationships
      operationId: listCharacterRelationships
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CharacterRelationship" }
    post:
      tags: [Character Relationships]
      summary: Create relationship
      operationId: createCharacterRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [relatedCharacterId, relationshipType]
              properties:
                relatedCharacterId: { type: string, format: uuid }
                relationshipType:
                  type: string
                  enum: [ally, rival, mentor, student, family, romantic, enemy, colleague, other]
                description: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CharacterRelationship" }

  /api/projects/{projectId}/characters/{id}/relationships/{relId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Id"
      - $ref: "#/components/parameters/RelId"
    patch:
      tags: [Character Relationships]
      summary: Update relationship
      operationId: updateCharacterRelationship
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                relationshipType:
                  type: string
                  enum: [ally, rival, mentor, student, family, romantic, enemy, colleague, other]
                description: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CharacterRelationship" }
